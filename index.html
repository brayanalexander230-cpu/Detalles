<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas para ti</title>
    <style>
        /* Estilos básicos */
        body {
            background: #ff0066; /* Fondo rosa intenso */
            margin: 0;
            padding: 30px 15px; /* Espacio arriba para el título */
            font-family: Arial, sans-serif;
        }

        /* Contenedor principal */
        .tarjeta {
            background: #f5f0e1; /* Fondo crema */
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            margin: 0 auto;
            text-align: left;
        }

        /* Título visible y bien posicionado */
        .titulo {
            color: white;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 0 0 5px black;
        }

        /* Texto dedicatorio */
        .texto {
            font-size: 1.5rem;
            color: #222;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        /* Contenedor de la animación */
        .animacion-arbol {
            width: 100%;
            height: 250px;
            position: relative;
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }

        /* Semilla */
        .semilla {
            position: absolute;
            bottom: 0;
            width: 20px;
            height: 20px;
            background: #8b4513;
            border-radius: 50% 50% 30% 30%;
            opacity: 0;
            animation: semilla 0.5s forwards;
        }

        /* Tronco */
        .tronco {
            position: absolute;
            bottom: 0;
            width: 15px;
            height: 90px;
            background: #8b4513;
            border-radius: 10px 10px 0 0;
            transform: scaleY(0);
            transform-origin: bottom;
            animation: tronco 1.5s forwards 0.8s;
        }

        /* Ramas */
        .rama-izq, .rama-der {
            position: absolute;
            background: #8b4513;
            transform: scale(0);
            transform-origin: bottom;
        }

        .rama-izq {
            bottom: 70px;
            left: 40%;
            width: 12px;
            height: 70px;
            border-radius: 50px 0 0 50px;
            transform: rotate(-40deg);
            animation: ramas 1.2s forwards 2.3s;
        }

        .rama-der {
            bottom: 70px;
            right: 40%;
            width: 12px;
            height: 70px;
            border-radius: 0 50px 50px 0;
            transform: rotate(40deg);
            animation: ramas 1.2s forwards 2.3s;
        }

        /* CORAZÓN BONITO Y REPLETO DE FLORES */
        .corazon {
            position: absolute;
            top: 20px;
            width: 140px;
            height: 130px;
            background: #ffd700; /* Color amarillo dorado */
            clip-path: path('M70,15 C90,0 125,10 125,40 C125,70 90,105 70,125 C50,105 15,70 15,40 C15,10 50,0 70,15 Z');
            opacity: 0;
            transform: scale(0);
            animation: corazon 1.5s forwards 3.5s;
            /* Detalle de flores pequeñas */
            background-image: radial-gradient(circle, #fff 1.5px, transparent 1.5px);
            background-size: 8px 8px;
        }

        /* Contador visible y bien posicionado */
        .contador {
            font-size: 1.2rem;
            font-weight: bold;
            color: #d4af37;
            text-align: center;
            border-top: 2px solid #d4af37;
            padding-top: 10px;
            margin-top: 15px;
            opacity: 0;
            animation: aparecer 1s forwards 5s;
        }

        /* Keyframes de animación */
        @keyframes semilla { to { opacity: 1; } }
        @keyframes tronco { to { transform: scaleY(1); } }
        @keyframes ramas { to { transform: rotate(-40deg) scale(1); } }
        @keyframes ramas { to { transform: rotate(40deg) scale(1); } }
        @keyframes corazon { to { transform: scale(1); opacity: 1; } }
        @keyframes aparecer { to { opacity: 1; } }
    </style>
</head>
<body>
    <!-- Título visible -->
    <div class="titulo">Para mi niña hermosa</div>

    <!-- Tarjeta principal -->
    <div class="tarjeta">
        <div class="texto">
            Flores Amarillas para el<br>
            amor de mi vida:<br><br>
            Si pudiera elegir un<br>
            lugar seguro,<br>
            sería a tu lado.<br><br>
            Cuanto más tiempo estoy<br>
            contigo, más mi corazón<br>
            se llena de amor.<br><br>
            Mi amor por ti comenzó hace...
        </div>

        <!-- Animación del árbol -->
        <div class="animacion-arbol">
            <div class="semilla"></div>
            <div class="tronco"></div>
            <div class="rama-izq"></div>
            <div class="rama-der"></div>
            <div class="corazon"></div>
        </div>

        <!-- Contador de tiempo -->
        <div class="contador" id="tiempo"></div>
    </div>

    <script>
        // CAMBIA ESTA FECHA POR LA DE TU RELACIÓN (AAAA-MM-DD)
        const fechaInicio = new Date('2018-07-18T00:00:00');

        function calcularTiempo() {
            const ahora = new Date();
            const diferencia = ahora - fechaInicio;

            const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            const horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);

            document.getElementById('tiempo').textContent = 
                `${dias} días ${horas} horas ${minutos} minutos ${segundos} segundos`;
        }

        // Actualizar cada segundo
        setInterval(calcularTiempo, 1000);
        calcularTiempo();
    </script>
</body>
</html>
