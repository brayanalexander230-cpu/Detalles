    <style>
        body {
            background: #ff0066;
            margin: 0;
            padding: 30px 15px;
            font-family: Arial, sans-serif;
        }

        .titulo {
            color: white;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 0 0 5px black;
        }

        .tarjeta {
            background: #f5f0e1;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            margin: 0 auto;
            text-align: left;
        }

        .texto {
            font-size: 1.5rem;
            color: #222;
            line-height: 1.8;
            margin-bottom: 25px;
        }

        .animacion-arbol {
            width: 100%;
            height: 300px;
            position: relative;
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }

        /* Elementos del árbol */
        .semilla {
            position: absolute;
            bottom: 0;
            width: 20px;
            height: 20px;
            background: #8b4513;
            border-radius: 50% 50% 30% 30%;
            opacity: 0;
            animation: semillaAparece 0.5s forwards;
        }

        .tronco {
            position: absolute;
            bottom: 0;
            width: 18px;
            height: 120px;
            background: #8b4513;
            border-radius: 10px 10px 0 0;
            transform: scaleY(0);
            transform-origin: bottom;
            opacity: 0;
            animation: troncoCrece 1.5s forwards 0.8s;
        }

        .rama-izq, .rama-der {
            position: absolute;
            bottom: 100px;
            width: 15px;
            height: 80px;
            background: #8b4513;
            transform: scale(0);
            transform-origin: bottom;
            opacity: 0;
        }

        .rama-izq {
            left: 42%;
            border-radius: 50px 0 0 50px;
            transform: rotate(-35deg);
            animation: ramaIzqCrece 1.2s forwards 2.3s;
        }

        .rama-der {
            right: 42%;
            border-radius: 0 50px 50px 0;
            transform: rotate(35deg);
            animation: ramaDerCrece 1.2s forwards 2.3s;
        }

        /* Contenedor de corazón con forma EXACTA al ejemplo */
        .corazon-girasoles {
            position: absolute;
            top: 20px;
            width: 220px;
            height: 200px;
            opacity: 0;
            animation: contenedorAparece 0.5s forwards 3.5s;
            /* Forma de corazón como guía */
            clip-path: path('M110,30 C150,0 220,40 220,90 C220,150 160,200 110,200 C60,200 0,150 0,90 C0,40 70,0 110,30 Z');
        }

        /* Girasol individual */
        .girasol {
            position: absolute;
            font-size: 8px;
            opacity: 0;
            transform: scale(0);
            animation: girasolCrece 0.5s forwards;
        }
