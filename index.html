<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Niña Hermosa 💛</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background-color: #000; overflow: hidden; font-family: 'Arial', sans-serif; color: #fff; }
        .container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .trunk { width: 12px; height: 0; background-color: #8B4513; position: absolute; bottom: 20%; border-radius: 10px; animation: growTrunk 1.5s ease-out forwards; z-index: 1; }
        @keyframes growTrunk { 100% { height: 240px; } }
        .flower { width: 8px; height: 8px; background-color: #FFD700; border-radius: 50%; position: absolute; opacity: 0; transform: scale(0); animation: bloom 0.8s ease-in-out forwards; box-shadow: 0 0 8px #FFD700; z-index: 2; }
        @keyframes bloom { 100% { opacity: 1; transform: scale(1); } }
        .text { position: absolute; bottom: 60px; opacity: 0; animation: fadeIn 2s ease-in forwards; animation-delay: 4.5s; font-size: 1.6rem; text-shadow: 0 0 12px #FFD700; font-weight: bold; width: 100%; text-align: center; }
        @keyframes fadeIn { 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="trunk"></div>
        <div id="garden"></div>
        <div class="text">Para mi niña hermosa. 💛<br>¡Te quiero un chingo!</div>
    </div>
    <script>
        const garden = document.getElementById('garden');
        for (let i = 0; i < 300; i++) {
            const flower = document.createElement('div');
            flower.className = 'flower';
            const t = Math.random() * 2 * Math.PI;
            const r = Math.sqrt(Math.random()); 
            let x = r * 16 * Math.pow(Math.sin(t), 3);
            let y = r * -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            flower.style.left = `${50 + (x * 2.2)}%`;
            flower.style.top = `${45 + (y * 2.2)}%`;
            flower.style.animationDelay = `${1.5 + (Math.random() * 3)}s`;
            const size = Math.random() * 5 + 5;
            flower.style.width = `${size}px`;
            flower.style.height = `${size}px`;
            garden.appendChild(flower);
        }
    </script>
</body>
</html>
