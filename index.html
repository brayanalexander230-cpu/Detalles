<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mí niña hermosa 💛</title>
    <style>
        body {
            background: #ff0066;
            padding: 30px;
            font-family: Arial, sans-serif;
        }

        .titulo {
            color: white;
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-shadow: 0 0 5px black;
        }

        .tarjeta {
            background: #f5f0e1;
            padding: 25px;
            border-radius: 10px;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }

        .texto {
            font-size: 1.2rem;
            color: #222;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .arbol-animado {
            width: 250px;
            height: 230px;
            margin: 0 auto 30px auto;
            position: relative;
        }

        .tronco {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 80px;
            background: #8b4513;
            border-radius: 5px 5px 0 0;
        }

        .ramas {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 160px;
        }

        .girasol {
            position: absolute;
            font-size: 8px;
            color: #ffd700;
            text-shadow: 0 0 2px black;
            opacity: 0;
            animation: aparecer 0.5s forwards;
        }

        /* Posiciones de girasoles que formaban el corazón bien */
        .girasol:nth-child(1) {top:10%;left:50%;animation-delay:4s;}
        .girasol:nth-child(2) {top:15%;left:45%;animation-delay:4.1s;}
        .girasol:nth-child(3) {top:15%;left:55%;animation-delay:4.1s;}
        .girasol:nth-child(4) {top:20%;left:40%;animation-delay:4.2s;}
        .girasol:nth-child(5) {top:20%;left:60%;animation-delay:4.2s;}
        .girasol:nth-child(6) {top:25%;left:35%;animation-delay:4.3s;}
        .girasol:nth-child(7) {top:25%;left:65%;animation-delay:4.3s;}
        .girasol:nth-child(8) {top:30%;left:30%;animation-delay:4.4s;}
        .girasol:nth-child(9) {top:30%;left:70%;animation-delay:4.4s;}
        .girasol:nth-child(10){top:35%;left:25%;animation-delay:4.5s;}
        .girasol:nth-child(11){top:35%;left:75%;animation-delay:4.5s;}
        .girasol:nth-child(12){top:40%;left:20%;animation-delay:4.6s;}
        .girasol:nth-child(13){top:40%;left:80%;animation-delay:4.6s;}
        .girasol:nth-child(14){top:45%;left:15%;animation-delay:4.7s;}
        .girasol:nth-child(15){top:45%;left:85%;animation-delay:4.7s;}
        .girasol:nth-child(16){top:50%;left:20%;animation-delay:4.8s;}
        .girasol:nth-child(17){top:50%;left:80%;animation-delay:4.8s;}
        .girasol:nth-child(18){top:55%;left:25%;animation-delay:4.9s;}
        .girasol:nth-child(19){top:55%;left:75%;animation-delay:4.9s;}
        .girasol:nth-child(20){top:60%;left:30%;animation-delay:5s;}
        .girasol:nth-child(21){top:60%;left:70%;animation-delay:5s;}
        .girasol:nth-child(22){top:65%;left:35%;animation-delay:5.1s;}
        .girasol:nth-child(23){top:65%;left:65%;animation-delay:5.1s;}
        .girasol:nth-child(24){top:70%;left:45%;animation-delay:5.2s;}
        .girasol:nth-child(25){top:70%;left:55%;animation-delay:5.2s;}
        .girasol:nth-child(26){top:75%;left:50%;animation-delay:5.3s;}

        @keyframes aparecer {
            to { opacity: 1; }
        }

        .contador {
            text-align: center;
            color: #ffd700;
            font-size: 1.3rem;
            font-weight: bold;
            margin-top: 20px;
        }

        /* Animaciones del árbol */
        @keyframes aparecer {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="titulo">Para mí niña hermosa 💛</div>
    
    <div class="tarjeta">
        <div class="texto">
            Si pudiera elegir un lugar seguro,<br>
            sería a tu lado.<br><br>
            Cuanto más tiempo estoy contigo,<br>
            más te amo.
        </div>

        <div class="arbol-animado">
            <div class="tronco"></div>
            <div class="ramas">
                <div class="girasol">🌻</div><div class="girasol">🌻</div><div class="girasol">🌻</div><div class="girasol">🌻</div><div class="girasol">🌻</div>
        <div class="girasol">🌻</div><div class="girasol">🌻</div><div class="girasol">🌻</div><div class="girasol">🌻</div><div class="girasol">🌻</div>
        <div class="girasol">🌻</div><div class="girasol">🌻</div><div class="girasol">🌻</div><div class="girasol">🌻</div><div class="girasol">🌻</div>
        <div class="girasol">🌻</div><div class="girasol">🌻</div><div class="girasol">🌻</div><div class="girasol">🌻</div><div class="girasol">🌻</div>
        <div class="girasol">🌻</div>
            </div>
        </div>

        <div class="contador" id="tiempo"></div>
    </div>

    <script>
        // Fecha de inicio (cámbiala por la de USTEDES)
        const fechaInicio = new Date('2014-02-10');
        
        function actualizarTiempo() {
            const ahora = new Date();
            const diferencia = ahora - fechaInicio;
            
            const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            const horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);

            document.getElementById('tiempo').textContent = `Mi amor por ti comenzó hace ${dias} días ${horas} horas ${minutos} minutos ${segundos} segundos`;
        }

        setInterval(actualizarTiempo, 1000);
        actualizarTiempo();
    </script>
</body>
</html>
