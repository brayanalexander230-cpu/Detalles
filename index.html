<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Niña</title>
    <style>
        body {
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: white;
        }

        .tree-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        /* Tronco más sólido */
        .trunk {
            position: absolute;
            width: 16px;
            background: linear-gradient(to right, #4e342e, #3e2723);
            border-radius: 8px 8px 0 0;
            bottom: 0;
            height: 0;
            z-index: 1;
            animation: growTrunk 1.2s ease-out forwards;
        }

        #heart-cluster {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 10;
            display: none;
        }

        .sunflower {
            position: absolute;
            font-size: 22px; /* Girasoles un poco más grandes para cubrir más */
            user-select: none;
            opacity: 0;
            filter: drop-shadow(0 0 3px rgba(0, 0, 0, 0.5));
            animation: flowerPop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes growTrunk {
            to { height: 140px; }
        }

        @keyframes flowerPop {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            100% { transform: scale(1) rotate(var(--rot)); opacity: 1; }
        }

        /* Tarjeta de texto ajustada */
        .text-card {
            background-color: rgba(255, 255, 255, 0.05);
            border: 2px solid #ffd740;
            border-radius: 20px;
            padding: 20px;
            width: 85%;
            max-width: 380px;
            text-align: center;
            opacity: 0;
            animation: fadeIn 1s ease-in 4s forwards;
            box-shadow: 0 0 20px rgba(255, 215, 64, 0.2);
            z-index: 20;
            margin-top: 20px;
        }

        @keyframes fadeIn { to { opacity: 1; } }
        h1 { color: #ffeb3b; font-size: 1.4rem; margin: 0 0 10px; text-shadow: 0 0 10px rgba(255,235,59,0.5); }
        p { font-size: 0.9rem; margin: 5px 0; color: #eee; }
        .heart-icon { color: #ff4081; font-weight: bold; margin-top: 15px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="tree-container">
        <div class="trunk"></div>
        <div id="heart-cluster"></div>
    </div>

    <div class="text-card">
        <h1>Flores Amarillas para ti 🌻</h1>
        <p>Si pudiera elegir un lugar seguro,</p>
        <p>sería siempre a tu lado.</p>
        <p>Porque te mereces lo más lindo del mundo.</p>
        <div class="heart-icon">❤ Te Amo ❤</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cluster = document.getElementById('heart-cluster');
            const totalFlowers = 800; // ¡A tope de girasoles para que no se vea nada negro!

            for (let i = 0; i < totalFlowers; i++) {
                const t = Math.random() * 2 * Math.PI;
                // Usamos una distribución que empuja más flores al centro
                const r = Math.pow(Math.random(), 0.5); 
                
                // Fórmula del corazón
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);

                const flower = document.createElement('div');
                flower.className = 'sunflower';
                flower.innerText = '🌻';
                
                const scale = 9; // Escala para cubrir bien el área
                const posX = (r * x * scale);
                const posY = (r * y * scale);

                flower.style.left = `calc(50% + ${posX}px)`;
                flower.style.bottom = `${posY + 180}px`; 
                
                // Rotación única para cada girasol
                flower.style.setProperty('--rot', `${Math.random() * 360}deg`);
                
                // Efecto de florecimiento en capas (de adentro hacia afuera)
                flower.style.animationDelay = `${1.2 + Math.random() * 3}s`;

                cluster.appendChild(flower);
            }

            setTimeout(() => {
                cluster.style.display = 'block';
            }, 800);
        });
    </script>
</body>
</html>
