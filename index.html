<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Niña</title>
    <style>
        body {
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: white;
        }

        .tree-container {
            position: relative;
            width: 300px;
            height: 350px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        /* Tronco */
        .trunk {
            position: absolute;
            width: 12px;
            background: #5d4037;
            border-radius: 6px;
            bottom: 0;
            height: 0;
            z-index: 1;
            animation: growTrunk 1.5s ease-out forwards;
        }

        /* Contenedor de flores */
        #heart-cluster {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 10;
            display: none;
        }

        .sunflower {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #ffeb3b;
            border-radius: 50%;
            box-shadow: 0 0 4px rgba(255, 235, 59, 0.5);
            opacity: 0;
            animation: flowerPop 0.5s ease-out forwards;
        }

        .sunflower::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 6px;
            height: 6px;
            background: #3e2723;
            border-radius: 50%;
        }

        @keyframes growTrunk {
            to { height: 150px; }
        }

        @keyframes flowerPop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Tarjeta de texto */
        .text-card {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid #ffd740;
            border-radius: 15px;
            padding: 20px;
            width: 85%;
            max-width: 380px;
            text-align: center;
            opacity: 0;
            animation: fadeIn 1s ease-in 4s forwards;
            box-shadow: 0 0 15px rgba(255, 215, 64, 0.1);
        }

        @keyframes fadeIn { to { opacity: 1; } }
        h1 { color: #ffeb3b; font-size: 1.3rem; margin: 0 0 10px; }
        p { font-size: 0.85rem; margin: 5px 0; }
        .heart-icon { color: #ff4081; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="tree-container">
        <div class="trunk"></div>
        <div id="heart-cluster"></div>
    </div>

    <div class="text-card">
        <h1>Flores Amarillas para ti</h1>
        <p>Si pudiera elegir un lugar seguro,</p>
        <p>sería siempre a tu lado.</p>
        <p>Porque te mereces lo más lindo del mundo.</p>
        <div class="heart-icon">❤ Te Amo ❤</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cluster = document.getElementById('heart-cluster');
            const totalFlowers = 350; // ¡Muchos girasoles para que esté bien relleno!

            for (let i = 0; i < totalFlowers; i++) {
                // Generamos puntos dentro del área del corazón
                const t = Math.random() * 2 * Math.PI;
                // El factor 'r' hace que se rellene el interior
                const r = Math.sqrt(Math.random()); 
                
                // Fórmula de corazón (Escala reducida a 7 para que sea más chico)
                const x = r * 16 * Math.pow(Math.sin(t), 3);
                const y = r * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

                const flower = document.createElement('div');
                flower.className = 'sunflower';
                
                const scale = 7; // Corazón más pequeño y estético
                flower.style.left = `calc(50% + ${x * scale}px)`;
                // Ajustado para que la punta inferior coincida con los 150px del tronco
                flower.style.bottom = `${(y * scale) + 165}px`; 
                
                // Animación aleatoria para que se vea natural
                flower.style.animationDelay = `${1.5 + Math.random() * 2.5}s`;

                cluster.appendChild(flower);
            }

            setTimeout(() => {
                cluster.style.display = 'block';
            }, 1000);
        });
    </script>
</body>
</html>
