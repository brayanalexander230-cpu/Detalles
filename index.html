    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ff0066;
            padding: 25px 15px;
            font-family: Arial, sans-serif;
        }

        .titulo {
            color: white;
            text-align: center;
            font-size: 1.6rem;
            margin-bottom: 20px;
            text-shadow: 0 0 5px #000;
        }

        .tarjeta {
            background: #f5f0e1;
            padding: 25px;
            border-radius: 10px;
            max-width: 500px;
            margin: 0 auto;
        }

        .texto {
            font-size: 1.4rem;
            color: #222;
            line-height: 2;
            margin-bottom: 25px;
        }

        .arbol {
            width: 100%;
            height: 320px;
            position: relative;
            margin: 20px 0;
        }

        .semilla {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background: #8b4513;
            border-radius: 50% 50% 30% 30%;
            opacity: 0;
            animation: semilla 0.5s forwards;
        }

        .tronco {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 18px;
            height: 130px;
            background: #8b4513;
            border-radius: 10px 10px 0 0;
            transform: scaleY(0);
            transform-origin: bottom;
            opacity: 0;
            animation: tronco 1.5s forwards 0.8s;
        }

        .rama-izq, .rama-der {
            position: absolute;
            bottom: 110px;
            width: 15px;
            height: 90px;
            background: #8b4513;
            opacity: 0;
            transform: scale(0);
            transform-origin: bottom;
        }

        .rama-izq {
            left: 40%;
            transform: rotate(-35deg);
            border-radius: 50px 0 0 50px;
            animation: rama 1.2s forwards 2.3s;
        }

        .rama-der {
            right: 40%;
            transform: rotate(35deg);
            border-radius: 0 50px 50px 0;
            animation: rama 1.2s forwards 2.3s;
        }

        .corazon {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 240px;
            height: 210px;
            opacity: 0;
            animation: corazon 0.5s forwards 3.5s;
            clip-path: path('M120,30 C160,0 240,40 240,90 C240,150 180,210 120,210 C60,210 0,150 0,90 C0,40 80,0 120,30 Z');
        }

        .girasol {
            position: absolute;
            font-size: 7px;
            opacity: 0;
            transform: scale(0);
            animation: girasol 0.5s forwards;
        }
