<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas para ti</title>
    <style>
        body {
            background: #ff0066;
            margin: 0;
            padding: 30px 15px;
            font-family: Arial, sans-serif;
        }

        .titulo {
            color: white;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 0 0 5px black;
        }

        .tarjeta {
            background: #f5f0e1;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            margin: 0 auto;
            text-align: left;
        }

        .texto {
            font-size: 1.5rem;
            color: #222;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .animacion-arbol {
            width: 100%;
            height: 280px;
            position: relative;
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }

        /* Semilla */
        .semilla {
            position: absolute;
            bottom: 0;
            width: 20px;
            height: 20px;
            background: #8b4513;
            border-radius: 50% 50% 30% 30%;
            opacity: 0;
            animation: semilla 0.5s forwards;
        }

        /* Tronco y ramas bien posicionadas */
        .tronco {
            position: absolute;
            bottom: 0;
            width: 15px;
            height: 90px;
            background: #8b4513;
            border-radius: 10px 10px 0 0;
            transform: scaleY(0);
            transform-origin: bottom;
            animation: tronco 1.5s forwards 0.8s;
        }

        .rama-izq {
            position: absolute;
            bottom: 70px;
            left: 42%;
            width: 12px;
            height: 70px;
            background: #8b4513;
            border-radius: 50px 0 0 50px;
            transform: rotate(-35deg) scale(0);
            transform-origin: bottom;
            animation: ramas 1.2s forwards 2.3s;
        }

        .rama-der {
            position: absolute;
            bottom: 70px;
            right: 42%;
            width: 12px;
            height: 70px;
            background: #8b4513;
            border-radius: 0 50px 50px 0;
            transform: rotate(35deg) scale(0);
            transform-origin: bottom;
            animation: ramas 1.2s forwards 2.3s;
        }

        /* Contenedor del corazón de girasoles */
        .corazon-contenedor {
            position: absolute;
            top: 20px;
            width: 160px;
            height: 150px;
            opacity: 0;
            animation: aparecerContenedor 0.5s forwards 3.5s;
        }

        /* Girasol individual (emoji como base) */
        .girasol {
            position: absolute;
            font-size: 12px; /* Tamaño de los girasoles */
            opacity: 0;
            transform: scale(0);
            animation: crecerGirasol 0.5s forwards;
        }

        /* Posicionar cada girasol para formar el corazón */
        .girasol:nth-child(1) { top: 40%; left: 50%; animation-delay: 4s; }
        .girasol:nth-child(2) { top: 35%; left: 45%; animation-delay: 4.1s; }
        .girasol:nth-child(3) { top: 35%; left: 55%; animation-delay: 4.1s; }
        .girasol:nth-child(4) { top: 30%; left: 40%; animation-delay: 4.2s; }
        .girasol:nth-child(5) { top: 30%; left: 60%; animation-delay: 4.2s; }
        .girasol:nth-child(6) { top: 25%; left: 35%; animation-delay: 4.3s; }
        .girasol:nth-child(7) { top: 25%; left: 65%; animation-delay: 4.3s; }
        .girasol:nth-child(8) { top: 20%; left: 40%; animation-delay: 4.4s; }
        .girasol:nth-child(9) { top: 20%; left: 60%; animation-delay: 4.4s; }
        .girasol:nth-child(10) { top: 15%; left: 45%; animation-delay: 4.5s; }
        .girasol:nth-child(11) { top: 15%; left: 55%; animation-delay: 4.5s; }
        .girasol:nth-child(12) { top: 10%; left: 50%; animation-delay: 4.6s; }
        .girasol:nth-child(13) { top: 45%; left: 35%; animation-delay: 4.2s; }
        .girasol:nth-child(14) { top: 45%; left: 65%; animation-delay: 4.2s; }
        .girasol:nth-child(15) { top: 50%; left: 30%; animation-delay: 4.3s; }
        .girasol:nth-child(16) { top: 50%; left: 70%; animation-delay: 4.3s; }
        .girasol:nth-child(17) { top: 55%; left: 35%; animation-delay: 4.4s; }
        .girasol:nth-child(18) { top: 55%; left: 65%; animation-delay: 4.4s; }
        .girasol:nth-child(19) { top: 60%; left: 40%; animation-delay: 4.5s; }
        .girasol:nth-child(20) { top: 60%; left: 60%; animation-delay: 4.5s; }
        .girasol:nth-child(21) { top: 65%; left: 45%; animation-delay: 4.6s; }
        .girasol:nth-child(22) { top: 65%; left: 55%; animation-delay: 4.6s; }
        .girasol:nth-child(23) { top: 70%; left: 50%; animation-delay: 4.7s; }
        .girasol:nth-child(24) { top: 25%; left: 50%; animation-delay: 4.3s; }
        .girasol:nth-child(25) { top: 35%; left: 50%; animation-delay: 4.1s; }
        .girasol:nth-child(26) { top: 45%; left: 50%; animation-delay: 4.2s; }
        .girasol:nth-child(27) { top: 55%; left: 50%; animation-delay: 4.4s; }

        .contador {
            font-size: 1.2rem;
            font-weight: bold;
            color: #d4af37;
            text-align: center;
            border-top: 2px solid #d4af37;
            padding-top: 10px;
            margin-top: 15px;
            opacity: 0;
            animation: aparecer 1s forwards 5.5s;
        }

        /* Keyframes */
        @keyframes semilla { to { opacity: 1; } }
        @keyframes tronco { to { transform: scaleY(1); } }
        @keyframes ramas { to { transform: rotate(-35deg) scale(1); } }
        @keyframes ramas { to { transform: rotate(35deg) scale(1); } }
        @keyframes aparecerContenedor { to { opacity: 1; } }
        @keyframes crecerGirasol { to { transform: scale(1); opacity: 1; } }
        @keyframes aparecer { to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="titulo">Para mi niña hermosa</div>

    <div class="tarjeta">
        <div class="texto">
            Flores Amarillas para el<br>
            amor de mi vida:<br><br>
            Si pudiera elegir un<br>
            lugar seguro,<br>
            sería a tu lado.<br><br>
            Cuanto más tiempo estoy<br>
            contigo, mi corazón<br>
            se llena más de amor.<br><br>
            Mi amor por ti comenzó hace...
        </div>

        <div class="animacion-arbol">
            <div class="semilla"></div>
            <div class="tronco"></div>
            <div class="rama-izq"></div>
            <div class="rama-der"></div>
            
            <!-- Corazón formado por girasoles -->
            <div class="corazon-contenedor">
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
                <div class="girasol">🌻</div>
            </div>
        </div>

        <div class="contador" id="tiempo"></div>
    </div>

    <script>
        const fechaInicio = new Date('2017-02-12T00:00:00');

        function calcularTiempo() {
            const ahora = new Date();
            const diferencia = ahora - fechaInicio;

            const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            const horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);

            document.getElementById('tiempo').textContent = 
                `${dias} días ${horas} horas ${minutos} minutos ${segundos} segundos`;
        }

        setInterval(calcularTiempo, 1000);
        calcularTiempo();
    </script>
</body>
</html>
