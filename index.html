<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Niña</title>
    <style>
        /* --- ESTILOS DE FONDO --- */
        body {
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: white;
            text-align: center;
        }

        /* --- CONTENEDOR DEL ÁRBOL --- */
        .tree-container {
            position: relative;
            width: 320px; 
            height: 320px;
            margin-bottom: 20px;
        }

        /* 1. Semilla */
        .seed {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #5d4037; 
            border-radius: 50%;
            bottom: 0;
            left: calc(50% - 10px);
            z-index: 10;
            animation: seedToTrunk 1.5s ease-out forwards;
        }

        /* 2. Tronco Grueso y Oscuro */
        .trunk {
            position: absolute;
            width: 12px;
            background: #3E2723;
            bottom: 0;
            left: calc(50% - 6px);
            border-radius: 6px;
            height: 0;
            opacity: 0;
            z-index: 5;
            animation: growTrunk 1.8s ease-out 1.5s forwards;
        }

        /* 3. Cluster de Girasoles - CORAZÓN PERFECTO */
        .flower-cluster {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            animation: showFlowers 1s ease-in 3.3s forwards;
        }

        /* Girasol con pétalos definidos */
        .flower {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #FFEB3B;
            border-radius: 50%;
            box-shadow: 0 0 6px #FFD700;
            opacity: 0;
            animation: flowerPop 0.4s ease-out forwards;
        }
        
        /* Centro café oscuro */
        .flower::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 10px;
            height: 10px;
            background: #3E2723;
            border-radius: 50%;
        }

        /* --- POSICIONES PARA CORAZÓN PERFECTO --- */
        /* Parte Superior del Corazón */
        .f01 { top: 18%; left: 50%; animation-delay: 3.3s; }
        .f02 { top: 22%; left: 42%; animation-delay: 3.4s; }
        .f03 { top: 22%; left: 58%; animation-delay: 3.4s; }
        .f04 { top: 25%; left: 38%; animation-delay: 3.5s; }
        .f05 { top: 25%; left: 62%; animation-delay: 3.5s; }
        .f06 { top: 28%; left: 35%; animation-delay: 3.6s; }
        .f07 { top: 28%; left: 65%; animation-delay: 3.6s; }
        
        /* Mitad del Corazón */
        .f08 { top: 32%; left: 32%; animation-delay: 3.7s; }
        .f09 { top: 32%; left: 68%; animation-delay: 3.7s; }
        .f10 { top: 36%; left: 30%; animation-delay: 3.8s; }
        .f11 { top: 36%; left: 70%; animation-delay: 3.8s; }
        .f12 { top: 40%; left: 28%; animation-delay: 3.9s; }
        .f13 { top: 40%; left: 72%; animation-delay: 3.9s; }
        .f14 { top: 45%; left: 30%; animation-delay: 4s; }
        .f15 { top: 45%; left: 70%; animation-delay: 4s; }
        .f16 { top: 50%; left: 33%; animation-delay: 4.1s; }
        .f17 { top: 50%; left: 67%; animation-delay: 4.1s; }
        .f18 { top: 55%; left: 37%; animation-delay: 4.2s; }
        .f19 { top: 55%; left: 63%; animation-delay: 4.2s; }
        .f20 { top: 60%; left: 42%; animation-delay: 4.3s; }
        .f21 { top: 60%; left: 58%; animation-delay: 4.3s; }
        .f22 { top: 65%; left: 50%; animation-delay: 4.4s; }
        
        /* Relleno Interno del Corazón */
        .f23 { top: 30%; left: 50%; animation-delay: 3.6s; }
        .f24 { top: 35%; left: 50%; animation-delay: 3.7s; }
        .f25 { top: 40%; left: 50%; animation-delay: 3.8s; }
        .f26 { top: 45%; left: 50%; animation-delay: 3.9s; }
        .f27 { top: 50%; left: 50%; animation-delay: 4s; }
        .f28 { top: 55%; left: 50%; animation-delay: 4.1s; }
        .f29 { top: 25%; left: 50%; animation-delay: 3.5s; }
        .f30 { top: 32%; left: 45%; animation-delay: 3.7s; }
        .f31 { top: 32%; left: 55%; animation-delay: 3.7s; }
        .f32 { top: 38%; left: 45%; animation-delay: 3.8s; }
        .f33 { top: 38%; left: 55%; animation-delay: 3.8s; }
        .f34 { top: 42%; left: 45%; animation-delay: 3.9s; }
        .f35 { top: 42%; left: 55%; animation-delay: 3.9s; }
        .f36 { top: 48%; left: 45%; animation-delay: 4s; }
        .f37 { top: 48%; left: 55%; animation-delay: 4s; }
        .f38 { top: 52%; left: 45%; animation-delay: 4.1s; }
        .f39 { top: 52%; left: 55%; animation-delay: 4.1s; }

        /* --- KEYFRAMES --- */
        @keyframes seedToTrunk {
            0% { transform: scale(1); opacity: 1; }
            80% { transform: scale(0.5); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }

        @keyframes growTrunk {
            0% { height: 0; opacity: 0; }
            20% { opacity: 1; }
            100% { height: 140px; opacity: 1; }
        }

        @keyframes showFlowers {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes flowerPop {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- TARJETA DE TEXTO --- */
        .text-card {
            background-color: rgba(0,0,0,0.6);
            border: 2px solid #FFD700;
            border-radius: 15px;
            padding: 20px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 0 20px rgba(255,215,0,0.4);
        }

        h1 {
            color: #FFEB3B;
            font-size: 1.6rem;
            margin: 0 0 10px 0;
        }

        p {
            font-size: 1rem;
            line-height: 1.6;
            margin: 5px 0;
        }

        .heart {
            color: #FF4081;
            font-weight: bold;
            margin-top: 15px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="tree-container">
        <div class="seed"></div>
        <div class="trunk"></div>
        
        <div class="flower-cluster">
            <div class="flower f01"></div><div class="flower f02"></div><div class="flower f03"></div><div class="flower f04"></div><div class="flower f05"></div>
            <div class="flower f06"></div><div class="flower f07"></div><div class="flower f08"></div><div class="flower f09"></div><div class="flower f10"></div>
            <div class="flower f11"></div><div class="flower f12"></div><div class="flower f13"></div><div class="flower f14"></div><div class="flower f15"></div>
            <div class="flower f16"></div><div class="flower f17"></div><div class="flower f18"></div><div class="flower f19"></div><div class="flower f20"></div>
            <div class="flower f21"></div><div class="flower f22"></div><div class="flower f23"></div><div class="flower f24"></div><div class="flower f25"></div>
            <div class="flower f26"></div><div class="flower f27"></div><div class="flower f28"></div><div class="flower f29"></div><div class="flower f30"></div>
            <div class="flower f31"></div><div class="flower f32"></div><div class="flower f33"></div><div class="flower f34"></div><div class="flower f35"></div>
            <div class="flower f36"></div><div class="flower f37"></div><div class="flower f38"></div><div class="flower f39"></div>
        </div>
    </div>

    <div class="text-card">
        <h1>Flores Amarillas para ti</h1>
        <p>Si pudiera elegir un lugar seguro,</p>
        <p>sería siempre a tu lado.</p>
        <p>Porque te mereces lo más lindo del mundo.</p>
        <p class="heart">❤ Te Amo ❤</p>
    </div>

</body>
</html>
