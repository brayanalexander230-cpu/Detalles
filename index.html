<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tulipanes para ti 🌷</title>
    <style>
        :root { --color-tallo: #2d5a27; --color-tulipan: #ff85a2; --color-tulipan-oscuro: #f55d81; }
        body { margin: 0; height: 100vh; background-color: #0b1522; display: flex; justify-content: center; align-items: flex-end; overflow: hidden; font-family: 'Arial', sans-serif; }
        .flower-container { position: relative; bottom: 50px; display: flex; gap: 40px; }
        
        /* Contenedor individual de cada flor */
        .flower { position: relative; display: flex; flex-direction: column; align-items: center; }

        /* Animación del Tallo */
        .tallo { width: 8px; height: 0; background-color: var(--color-tallo); border-radius: 4px; animation: crecerTallo 3s ease-out forwards; position: relative; }
        @keyframes crecerTallo { 0% { height: 0; } 100% { height: 250px; } }

        /* Hojas animadas */
        .hoja { position: absolute; width: 40px; height: 20px; background-color: var(--color-tallo); border-radius: 50% 50% 0 50%; opacity: 0; transform: scale(0); animation: aparecerHoja 1s ease-out forwards; }
        .hoja.izq { left: -35px; top: 150px; transform: rotate(-30deg); animation-delay: 1.5s; }
        .hoja.der { right: -35px; top: 100px; transform: rotate(210deg); border-radius: 50% 50% 50% 0; animation-delay: 2s; }
        @keyframes aparecerHoja { 100% { opacity: 1; transform: scale(1); } }

        /* Capullo del Tulipán */
        .tulipan-cabeza { position: absolute; top: -40px; width: 50px; height: 60px; opacity: 0; animation: abrirFlor 2s ease-in-out forwards; animation-delay: 2.8s; }
        
        .petalo { position: absolute; width: 100%; height: 100%; background-color: var(--color-tulipan); border-radius: 50% 50% 20% 20%; box-shadow: inset 0 0 15px rgba(0,0,0,0.1); }
        .petalo-central { z-index: 2; transform: scale(0.8); background-color: var(--color-tulipan-oscuro); }
        .petalo-izq { left: -15px; transform: rotate(-20deg); z-index: 1; }
        .petalo-der { right: -15px; transform: rotate(20deg); z-index: 1; }

        @keyframes abrirFlor {
            0% { transform: translateY(20px) scale(0); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .texto { position: absolute; top: -350px; width: 300px; left: 50%; transform: translateX(-50%); color: white; opacity: 0; animation: fadeIn 2s forwards; animation-delay: 5s; text-align: center; text-shadow: 0 0 10px var(--color-tulipan); font-size: 1.5rem; font-weight: bold; }
        @keyframes fadeIn { 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="flower-container">
        <div class="flower">
            <div class="tulipan-cabeza">
                <div class="petalo petalo-izq"></div>
                <div class="petalo petalo-der"></div>
                <div class="petalo petalo-central"></div>
            </div>
            <div class="tallo">
                <div class="hoja izq"></div>
                <div class="hoja der"></div>
            </div>
        </div>
        <div class="flower">
            <div class="tulipan-cabeza" style="animation-delay: 3.2s;">
                <div class="petalo petalo-izq"></div>
                <div class="petalo petalo-der"></div>
                <div class="petalo petalo-central"></div>
            </div>
            <div class="tallo" style="animation-delay: 0.5s;">
                <div class="hoja izq" style="animation-delay: 2.2s;"></div>
                <div class="hoja der" style="animation-delay: 2.7s;"></div>
            </div>
            <div class="texto">Para mi niña hermosa 🌷</div>
        </div>
        <div class="flower">
            <div class="tulipan-cabeza" style="animation-delay: 3.5s;">
                <div class="petalo petalo-izq"></div>
                <div class="petalo petalo-der"></div>
                <div class="petalo petalo-central"></div>
            </div>
            <div class="tallo" style="animation-delay: 0.8s;">
                <div class="hoja izq" style="animation-delay: 2.5s;"></div>
                <div class="hoja der" style="animation-delay: 3s;"></div>
            </div>
        </div>
    </div>
</body>
</html>
