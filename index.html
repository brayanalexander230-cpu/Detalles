<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Niña</title>
    <style>
        /* --- ESTILOS DE FONDO Y ESTRUCTURA (Style.css style) --- */
        
        /* 1. Fondo oscuro y centrado */
        body {
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: white;
            text-align: center;
        }

        /* 2. Contenedor principal de la tarjeta */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* 3. La Copa de Girasoles Tupida y Densa */
        /* Esta parte es clave: usaremos JavaScript para posicionar cientos de flores */
        .heart-tree-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Alinear abajo para el tronco */
            padding-bottom: 30px; /* Espacio para el tronco */
        }

        /* El tronco marrón del árbol */
        .trunk {
            position: absolute;
            bottom: 0;
            width: 15px; /* Ancho ajustado */
            height: 180px; /* Altura ajustada */
            background-color: #5d4037; /* Marrón oscuro */
            border-radius: 8px; /* Bordes suaves */
            z-index: 5;
        }

        /* Contenedor que formará el corazón de flores */
        #heart-cluster {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: none; /* Se oculta hasta que el tronco crezca */
        }

        /* ESTILO DE UNA FLOR INDIVIDUAL (PÉTALO) */
        .flower-item {
            position: absolute;
            width: 18px; /* Tamaño del girasol (ajustado) */
            height: 18px;
            background: #ffeb3b; /* Amarillo vibrante */
            border-radius: 50%;
            box-shadow: inset 0 0 3px rgba(0,0,0,0.4);
            opacity: 0; /* Empieza invisible */
            animation: flowerPop 0.5s ease-out forwards;
        }

        /* Centro marrón del girasol (como en image_16.png) */
        .flower-item::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            width: 10px;
            height: 10px;
            background: #3e2723;
            border-radius: 50%;
        }

        /* Brillo de aureola dorada alrededor del corazón */
        #heart-cluster::after {
            content: '';
            position: absolute;
            top: 25%;
            left: 20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(255, 235, 59, 0.4) 0%, rgba(255, 235, 59, 0) 70%);
            border-radius: 50%;
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            animation: showGlow 1.5s ease-out 3s forwards;
        }

        /* --- TARJETA DE TEXTO (Estilo image_16.png) --- */
        .text-card {
            background-color: rgba(255, 255, 255, 0.05); /* Fondo oscuro transparente */
            border: 1px solid #ffd740; /* Borde amarillo brillante */
            border-radius: 15px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            opacity: 0;
            animation: showText 1.5s ease-out 5s forwards; /* Aparece al final */
            box-shadow: 0 0 15px rgba(255, 215, 64, 0.2);
            position: relative;
            z-index: 10; /* Por encima de todo */
        }

        h1 {
            color: #ffeb3b;
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 10px;
        }

        p {
            font-size: 0.9rem;
            line-height: 1.5;
            margin: 0;
        }

        /* Corazón rosa (como en la imagen) */
        .heart {
            color: #ff4081; /* Rosa intenso */
            margin-top: 15px;
            font-weight: bold;
        }

        /* --- KEYFRAMES (LAS ANIMACIONES) --- */
        @keyframes flowerPop {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes showText {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes showGlow {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart-tree-container">
            <div class="trunk"></div>
            
            <div id="heart-cluster"></div>
        </div>

        <div class="text-card">
            <h1>Flores Amarillas para ti</h1>
            <p>Si pudiera elegir un lugar seguro,</p>
            <p>sería siempre a tu lado.</p>
            <div style="height: 10px;"></div>
            <p>Porque te mereces lo más lindo del mundo.</p>
            <p class="heart">❤ Te Amo ❤</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cluster = document.getElementById('heart-cluster');
            const totalFlowers = 300; // ¡Añadiremos 300 girasoles para que sea denso!

            // Fórmula matemática para un corazón perfecto (Paramétrica)
            // t va de 0 a 2*PI
            const getHeartPoint = (t) => {
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                return { x, y };
            };

            // Generar y posicionar cientos de flores
            for (let i = 0; i < totalFlowers; i++) {
                // Parámetro 't' para cada flor (de 0 a 2*PI)
                const t = (i / totalFlowers) * 2 * Math.PI;
                const point = getHeartPoint(t);

                const flower = document.createElement('div');
                flower.classList.add('flower-item');

                // Posicionar en el centro y escalar los puntos
                const scale = 8.5; // Ajusta el tamaño del corazón
                const offsetX = 50; // Centro horizontal (%)
                const offsetY = 45; // Centro vertical (%)
                
                // Las matemáticas del corazón ponen (0,0) en el centro.
                // Ajustamos para que (0,0) sea el centro inferior del contenedor.
                // -point.y invierte el eje Y para que suba
                flower.style.left = (point.x * scale + offsetX) + '%';
                flower.style.top = (-point.y * scale + offsetY) + '%';

                // Añadir retraso para la animación secuencial
                // Las flores de abajo aparecen primero
                const yDelay = (-point.y + 15) / 30; // Normalizar yDelay (más bajo -> menor retraso)
                flower.style.animationDelay = (2 + yDelay * 2) + 's'; // Retraso de floración

                cluster.appendChild(flower);
            }

            // Mostrar el cluster después de que el tronco empiece a crecer
            setTimeout(() => {
                cluster.style.display = 'block';
            }, 1500); // 1.5 segundos de retraso
        });
    </script>

</body>
</html>
