        .tarjeta {
            background: #f5f0e1;
            padding: 25px;
            border-radius: 10px;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }

        .texto {
            font-size: 1.3rem;
            color: #222;
            line-height: 1.8;
            margin-bottom: 30px;
            text-shadow: 0 0 1px rgba(0,0,0,0.2);
        }

        .arbol-animado {
            width: 220px;
            height: 250px;
            margin: 0 auto 30px auto;
            position: relative;
        }

        .tronco {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 18px;
            height: 100px;
            background: #8b4513;
            border-radius: 5px 5px 0 0;
        }

        .ramas {
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 180px;
            /* Forma de corazón como guía para los girasoles */
            clip-path: path('M100,30 C140,0 200,40 200,90 C200,150 140,180 100,180 C60,180 0,150 0,90 C0,40 60,0 100,30 Z');
        }

        .girasol {
            position: absolute;
            font-size: 9px;
            opacity: 0;
            transform: scale(0);
            animation: aparecer 0.5s forwards;
