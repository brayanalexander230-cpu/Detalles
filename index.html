<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>Sorpresa para mi amor 💛</title>
    <style>
        body {
            background: #ff0066;
        margin: 0;
        padding: 20px 15px;
        font-family: Arial, sans-serif;
        }

        .tarjeta {
            background: #f5f0e1;
            padding: 25px;
            border-radius: 10px;
            max-width: 500px;
            margin: 0 auto;
        }

        .texto {
            font-size: 1.5rem;
        color: #222;
        line-height: 1.8;
        margin-bottom: 25px;
        }

        .arbol-animacion {
            width: 100%;
            height: 300px;
            position: relative;
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }

        /* Elementos del árbol */
        .semilla {
            position: absolute;
            bottom: 0;
            width: 20px;
            height: 20px;
            background: #8b4513;
            border-radius: 50% 50% 30% 30%;
            opacity: 0;
            animation: semilla 0.5s forwards;
        }

        .tronco {
            position: absolute;
            bottom: 0;
            width: 15px;
            height: 100px;
            background: #8b4513;
            border-radius: 10px 10px 0 0;
            transform: scaleY(0);
            transform-origin: bottom;
            animation: tronco 1.5s forwards 0.8s;
        }

        .rama-izq {
            position: absolute;
            bottom: 80px;
            left: 45%;
            width: 12px;
            height: 80px;
            background: #8b4513;
            border-radius: 50px 0 0 50px;
            transform: rotate(-35deg) scale(0);
            transform-origin: bottom;
            animation: rama 1.2s forwards 2.3s;
        }

        .rama-der {
            position: absolute;
            bottom: 80px;
            right: 45%;
            width: 12px;
            height: 80px;
            background: #8b4513;
            border-radius: 0 50px 50px 0;
            transform: rotate(35deg) scale(0);
            transform-origin: bottom;
            animation: rama 1.2s forwards 2.3s;
        }

        /* CORAZÓN DE GIRASOLES PERFECTO */
        .corazon {
            position: absolute;
            top: 20px;
            width: 200px;
            height: 180px;
            opacity: 0;
            animation: corazon 1.5s forwards 3.5s;
            clip-path: path('M100,30 C130,0 200,20 200,60 C200,100 150,150 100,180 C50,150 0,100 0,60 C0,20 70,0 100,30 Z');
        }

        .girasol {
            position: absolute;
            font-size: 9px;
            opacity: 0;
            transform: scale(0);
            animation: girasol 0.5s forwards;
        }

        /* 150 girasoles para llenar completamente */
        .girasol:nth-child(1) {top:10%;left:50%;animation-delay:4s;} .girasol:nth-child(2) {top:15%;left:45%;animation-delay:4.1s;} .girasol:nth-child(3) {top:15%;left:55%;animation-delay:4.1s;}

        .contador {
            font-size: 1.2rem;
            color: #d4af37;
            text-align: center;
            border-top: 2px solid #d4af37;
            padding-top: 15px;
            margin-top: 20px;
            font-weight: bold;
            opacity: 0;
            animation: contador 1s forwards 6.5s;
        }

        /* Animaciones */
        @keyframes semilla { to { opacity: 1; } }
        @keyframes tronco { to { transform: scaleY(1); } }
        @keyframes rama { to { transform: rotate(-35deg) scale(1); } }
        @keyframes rama { to { transform: rotate(35deg) scale(1); } }
        @keyframes corazon { to { opacity: 1; } }
        @keyframes girasol { to { opacity: 1; transform: scale(1); } }
        @keyframes contador { to { opacity: 1; } }
    </style>
</head>
