<html lang="es">

    <title>Para mi Niña</title>
    <style>
        /* --- ESTILOS DE FONDO --- */
        body {
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: white;
            text-align: center;
        }

        /* --- LA GRAN ANIMACIÓN DEL ÁRBOL --- */
        .tree-container {
            position: relative;
            width: 350px; /* Área más grande para el corazón */
            height: 320px;
            margin-bottom: 20px;
        }

        /* 1. Semilla/Punto de Crecimiento */
        .seed {
            position: absolute;
            width: 25px;
            height: 25px;
            background: #3E2723; /* Más oscuro que el tronco */
            border-radius: 50%;
            bottom: 0;
            left: calc(50% - 12.5px);
            z-index: 10;
            animation: seedToTrunk 1s ease-out forwards; /* Animación más rápida */
        }

        /* 2. Tronco más grueso y oscuro */
        .trunk {
            position: absolute;
            width: 22px; /* Más grueso */
            background: #3E2723; /* Más oscuro */
            bottom: 0;
            left: calc(50% - 11px);
            border-radius: 8px;
            height: 0;
            opacity: 0;
            z-index: 5;
            animation: growTrunk 1.2s ease-out 1s forwards; /* Más rápida */
        }

        /* 3. Cluster de girasoles en CORAZÓN MÁS GRANDE Y TUPIDO */
        .flower-cluster {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            animation: showFlowers 0.8s ease-in 2.2s forwards; /* Más rápida */
        }

        /* Girasoles MÁS GRANDES, con pétalos amarillos y centro café */
        .flower {
            position: absolute;
            width: 25px; /* Más grandes */
            height: 25px;
        }

        /* Forma de pétalos amarillos */
        .flower::before {
            content: '';
            position: absolute;
            width: 25px;
            height: 25px;
            background: radial-gradient(circle, #FFEB3B 0%, #FFD600 70%);
            border-radius: 50%;
            z-index: 2;
        }

        /* Centro café oscuro */
        .flower::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background: #3E2723;
            border-radius: 50%;
            z-index: 3;
        }
