<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi amor 💛</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FF0066;
            background-image: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .tarjeta {
            background-color: #F5F0E1;
            width: 90%;
            max-width: 600px;
            border-radius: 20px;
            padding: 40px 30px;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        .titulo-superior {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #333333;
            font-size: 16px;
            line-height: 1.5;
        }

        .texto-izquierda {
            position: absolute;
            top: 100px;
            left: 30px;
            color: #333333;
            font-size: 16px;
            line-height: 1.8;
        }

        .corazon-girasoles {
            position: absolute;
            top: 80px;
            right: 30px;
            width: 280px;
            height: 250px;
        }

        .corazon-forma {
            width: 100%;
            height: 100%;
            clip-path: path('M140,30 C180,0 280,40 280,90 C280,150 220,250 140,250 C60,250 0,150 0,90 C0,40 80,0 140,30 Z');
            background-color: #FFD700;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-content: space-around;
            padding: 10px;
        }

        .girasol {
            width: 15px;
            height: 15px;
            background-color: #FFCC00;
            border-radius: 50%;
            position: relative;
        }

        .girasol::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            background-color: #8B4513;
            border-radius: 50%;
        }

        .tronco {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 50px;
            background-color: #8B4513;
            border-radius: 5px 5px 0 0;
        }

        .texto-tiempo {
            position: absolute;
            bottom: 60px;
            left: 30px;
            color: #333333;
            font-size: 16px;
        }

        .contador {
            position: absolute;
            bottom: 30px;
            left: 30px;
            color: #DAA520;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .alex-dev {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #333333;
            font-size: 22px;
            font-weight: bold;
        }

        .pie-texto {
            position: absolute;
            top: 220px;
            left: 30px;
            color: #333333;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="tarjeta">
        <div class="alex-dev">Para mi niña hermosa 💛</div>
        <div class="titulo-superior">Flores Amarillas para el amor de mi vida:</div>
        <div class="texto-izquierda">
            Si pudiera elegir un<br>
            lugar seguro,<br>
            sería a tu lado.<br><br>
            Cuanto más tiempo estoy<br>
            contigo más te amo.<br><br>
            — I Love You!
        </div>
        <div class="corazon-girasoles">
            <div class="corazon-forma">
                <div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div>
                <div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div>
        <div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div>
        <div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div>
        <div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div>
        <div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div>
        <div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div>
        <div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div>
        <div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div>
        <div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div>
        <div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div>
        <div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div>
        <div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div><div class="girasol"></div>
            </div>
            <div class="tronco"></div>
        </div>
        <div class="texto-tiempo">Mi amor por ti comenzó hace...</div>
        <div class="contador" id="contador">365 días 00 horas 00 minutos 00 segundos</div>
        <div class="pie-texto">— I Love You!</div>
    </div>

    <script>
        // FECHA DE INICIO - CAMBIA ESTA FECHA POR LA DE TU RELACIÓN
        const fechaInicio = new Date('2017-02-10');
        
        function actualizarContador() {
            const ahora = new Date();
            const diferencia = ahora - fechaInicio;
            
            const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            const horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);
            
            document.getElementById('contador').textContent = `${dias} días ${horas.toString().padStart(2, '0')} horas ${minutos.toString().padStart(2, '0')} minutos ${segundos.toString().padStart(2, '0')} segundos`;
        }

        // Actualizar cada segundo
        setInterval(actualizarContador, 1000);
        actualizarContador();
    </script>
</body>
</html>
