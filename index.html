<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Niña</title>
    <style>
        /* --- ESTILOS DE FONDO Y ESTRUCTURA --- */
        body {
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: white;
            text-align: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .heart-tree-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 30px;
        }

        .trunk {
            position: absolute;
            bottom: 0;
            width: 15px;
            height: 180px;
            background-color: #5d4037;
            border-radius: 8px;
            z-index: 5;
        }

        #heart-cluster {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: none;
        }

        .flower-item {
            position: absolute;
            width: 18px;
            height: 18px;
            background: #ffeb3b;
            border-radius: 50%;
            box-shadow: inset 0 0 3px rgba(0,0,0,0.4);
            opacity: 0;
            animation: flowerPop 0.5s ease-out forwards;
        }

        .flower-item::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            width: 10px;
            height: 10px;
            background: #3e2723;
            border-radius: 50%;
        }

        #heart-cluster::after {
            content: '';
            position: absolute;
            top: 25%;
            left: 20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(255, 235, 59, 0.4) 0%, rgba(255, 235, 59, 0) 70%);
            border-radius: 50%;
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            animation: showGlow 1.5s ease-out 3s forwards;
        }

        .text-card {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid #ffd740;
            border-radius: 15px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            opacity: 0;
            animation: showText 1.5s ease-out 5s forwards;
            box-shadow: 0 0 15px rgba(255, 215, 64, 0.2);
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #ffeb3b;
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 10px;
        }

        p {
            font-size: 0.9rem;
            line-height: 1.5;
            margin: 0;
        }

        .heart {
            color: #ff4081;
            margin-top: 15px;
            font-weight: bold;
        }

        /* --- KEYFRAMES --- */
        @keyframes flowerPop {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes showText {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes showGlow {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart-tree-container">
            <div class="trunk"></div>
            <div id="heart-cluster"></div>
        </div>

        <div class="text-card">
            <h1>Flores Amarillas para ti</h1>
            <p>Si pudiera elegir un lugar seguro,</p>
            <p>sería siempre a tu lado.</p>
            <div style="height: 10px;"></div>
            <p>Porque te mereces lo más lindo del mundo.</p>
            <p class="heart">❤ Te Amo ❤</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cluster = document.getElementById('heart-cluster');
            const totalFlowers = 600; // Cantidad aumentada a 600 girasoles
            const scale = 9; // Ajuste del tamaño del corazón para mejor relleno
            const offsetX = 50;
            const offsetY = 45;

            // Fórmula paramétrica del corazón principal
            const getHeartPoint = (t) => {
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                return { x, y };
            };

            // Generar flores en el contorno principal
            for (let i = 0; i < totalFlowers * 0.4; i++) {
                const t = (i / (totalFlowers * 0.4)) * 2 * Math.PI;
                const point = getHeartPoint(t);
                const flower = document.createElement('div');
                flower.classList.add('flower-item');
                flower.style.left = (point.x * scale + offsetX) + '%';
                flower.style.top = (-point.y * scale + offsetY) + '%';
                const yDelay = (-point.y + 15) / 30;
                flower.style.animationDelay = (2 + yDelay * 2) + 's';
                cluster.appendChild(flower);
            }

            // Generar flores de relleno interno con variación aleatoria
            for (let i = 0; i < totalFlowers * 0.6; i++) {
                // Variar t y añadir pequeño desfase para rellenar huecos
                const t = Math.random() * 2 * Math.PI;
                const randomScale = 0.5 + Math.random() * 0.5; // Escala entre 0.5 y 1
                const point = getHeartPoint(t);
                const flower = document.createElement('div');
                flower.classList.add('flower-item');
                flower.style.left = (point.x * scale * randomScale + offsetX) + '%';
                flower.style.top = (-point.y * scale * randomScale + offsetY) + '%';
                const yDelay = (-point.y * randomScale + 15) / 30;
                flower.style.animationDelay = (2 + yDelay * 2) + 's';
                cluster.appendChild(flower);
            }

            // Mostrar el cluster con pequeño retraso
            setTimeout(() => {
                cluster.style.display = 'block';
            }, 1200); // Retraso reducido ligeramente para mayor fluidez
        });
    </script>

</body>
</html>
