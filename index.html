<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi niña hermosa💛</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ff0066;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        /* Tarjeta principal */
        .tarjeta {
            background: #f5f0e1;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            position: relative;
        }

        /* Título superior */
        .titulo-superior {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #333;
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* Texto de la tarjeta */
        .texto-izq {
            position: absolute;
        top: 80px;
        left: 30px;
        width: 250px;
        color: #222;
        font-size: 1.1rem;
        line-height: 1.8;
        }

        /* Árbol corazón de girasoles */
        .arbol-corazon {
            position: absolute;
            right: 30px;
            top: 60px;
            width: 280px;
            height: 250px;
        }

        /* Imagen del corazón de girasoles (usamos una imagen base para que quede igual) */
        .corazon-img {
            width: 100%;
            height: 100%;
            background-image: url('https://i.imgur.com/9QZ7X8y.png'); /* Imagen igual al ejemplo */
            background-size: cover;
            background-position: center;
        }

        /* Contador de tiempo */
        .contador-tiempo {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #d4af37;
            font-size: 1.3rem;
            font-weight: bold;
        }

        /* Texto "Mi amor por ti comenzó hace..." */
        .texto-tiempo {
            position: absolute;
            bottom: 60px;
            left: 30px;
            color: #222;
            font-size: 1.2rem;
        }

        /* Efecto de fondo con corazones */
        .fondo-corazones {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://i.imgur.com/5RjK7QH.png');
            background-size: 50px;
            opacity: 0.2;
            z-index: -1;
        }

        /* Pie de página "ALEX DEV" */
        .pie-pagina {
            position: absolute;
            top: 10px;
            right: 30px;
            color: #333;
            font-size: 1.5rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="fondo-corazones"></div>
    <div class="tarjeta">
        <div class="pie-pagina">ALEX DEV</div>
        <div class="titulo-superior">Flores Amarillas para el amor de mi vida:</div>
        <div class="texto-izq">
            Flores Amarillas para el<br>
            amor de mi vida:<br><br>
            Si pudiera elegir un<br>
            lugar seguro,<br>
            sería a tu lado.<br><br>
            Cuanto más tiempo estoy<br>
            contigo más te amo.
        </div>
        <div class="texto-tiempo">Mi amor por ti comenzó hace...</div>
        <div class="arbol-corazon">
            <div class="corazon-img"></div>
        </div>
        <div class="contador-tiempo" id="tiempo">365 días 00 horas 00 minutos 00 segundos</div>
    </div>

    <script>
        // Fecha de inicio (CAMBIA ESTA FECHA POR LA DE USTEDES)
        const fechaInicio = new Date('2017-02-10');
        
        function actualizarTiempo() {
            const ahora = new Date();
            const diferencia = ahora - fechaInicio;
            
            const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            const horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);

            document.getElementById('tiempo').textContent = `${dias} días ${horas} horas ${minutos} minutos ${segundos} segundos`;
        }

        // Actualizar cada segundo
        setInterval(actualizarTiempo, 1000);
        actualizarTiempo();
    </script>
</body>
</html>
