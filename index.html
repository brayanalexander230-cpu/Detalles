<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Niña</title>
    <style>
        body {
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: white;
        }

        .tree-container {
            position: relative;
            width: 350px;
            height: 400px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        /* Tronco */
        .trunk {
            position: absolute;
            width: 14px;
            background: linear-gradient(to right, #5d4037, #3e2723);
            border-radius: 6px;
            bottom: 0;
            height: 0;
            z-index: 1;
            animation: growTrunk 1.5s ease-out forwards;
        }

        /* Contenedor de flores */
        #heart-cluster {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 10;
            display: none;
        }

        /* Clase para el emoji de girasol */
        .sunflower {
            position: absolute;
            font-size: 18px; /* Tamaño del girasol */
            user-select: none;
            opacity: 0;
            filter: drop-shadow(0 0 5px rgba(255, 235, 59, 0.4));
            animation: flowerPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes growTrunk {
            to { height: 160px; }
        }

        @keyframes flowerPop {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* Tarjeta de texto */
        .text-card {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid #ffd740;
            border-radius: 15px;
            padding: 20px;
            width: 85%;
            max-width: 380px;
            text-align: center;
            opacity: 0;
            animation: fadeIn 1s ease-in 4s forwards;
            box-shadow: 0 0 15px rgba(255, 215, 64, 0.1);
        }

        @keyframes fadeIn { to { opacity: 1; } }
        h1 { color: #ffeb3b; font-size: 1.3rem; margin: 0 0 10px; }
        p { font-size: 0.85rem; margin: 5px 0; }
        .heart-icon { color: #ff4081; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="tree-container">
        <div class="trunk"></div>
        <div id="heart-cluster"></div>
    </div>

    <div class="text-card">
        <h1>Flores Amarillas para ti 🌻</h1>
        <p>Si pudiera elegir un lugar seguro,</p>
        <p>sería siempre a tu lado.</p>
        <p>Porque te mereces lo más lindo del mundo.</p>
        <div class="heart-icon">❤ Te Amo ❤</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cluster = document.getElementById('heart-cluster');
            const totalFlowers = 500; // Aumentamos a 500 para que esté súper tupido

            for (let i = 0; i < totalFlowers; i++) {
                const t = Math.random() * 2 * Math.PI;
                // Relleno uniforme dentro del corazón
                const r = Math.sqrt(Math.random()); 
                
                // Ecuación paramétrica del corazón
                const x = r * 16 * Math.pow(Math.sin(t), 3);
                const y = r * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

                const flower = document.createElement('div');
                flower.className = 'sunflower';
                flower.innerText = '🌻';
                
                const scale = 8; // Escala ideal para que rellene bien
                flower.style.left = `calc(50% + ${x * scale}px)`;
                // Ajuste para que la punta inferior tape un poco el tronco
                flower.style.bottom = `${(y * scale) + 170}px`; 
                
                // Delay aleatorio para el efecto de "brote" natural
                flower.style.animationDelay = `${1.5 + Math.random() * 2.5}s`;
                
                // Rotación aleatoria para que no se vean todos iguales
                const rotation = Math.random() * 360;
                flower.style.transform = `rotate(${rotation}deg)`;

                cluster.appendChild(flower);
            }

            setTimeout(() => {
                cluster.style.display = 'block';
            }, 1000);
        });
    </script>
</body>
</html>
