<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Niña</title>
    <style>
        /* --- ESTILOS GLOBAL (CSS) --- */
        body {
            background-color: #000; /* Fondo negro */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: white;
            text-align: center;
        }

        /* --- LA GRAN ANIMACIÓN DEL ÁRBOL --- */
        .tree-container {
            position: relative;
            width: 300px; /* Tamaño del área del árbol */
            height: 300px;
            margin-bottom: 25px; /* Espacio con el texto */
        }

        /* Tronco (Ccrece de abajo a arriba) */
        .trunk {
            position: absolute;
            width: 10px;
            background: #5d4037; /* Marrón tronco */
            border-radius: 5px;
            bottom: 0;
            left: calc(50% - 5px);
            height: 0;
            opacity: 0;
            z-index: 5;
            animation: growTrunk 1.5s ease-out forwards;
        }

        /* El contenedor que formará el corazón de flores */
        #heart-cluster {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: none; /* Se oculta hasta que el tronco crezca */
        }

        /* ESTILO DE UNA FLOR INDIVIDUAL (TUPIDO) */
        .flower-item {
            position: absolute;
            width: 15px; /* Tamaño del girasol */
            height: 15px;
            background: #ffeb3b; /* Amarillo vibrante */
            border-radius: 50%;
            box-shadow: inset 0 0 2px rgba(0,0,0,0.4);
            opacity: 0; /* Empieza invisible */
            animation: flowerPop 0.5s ease-out forwards;
        }

        /* Centro marrón del girasol (como en la imagen 18.png) */
        .flower-item::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            width: 7px;
            height: 7px;
            background: #3e2723;
            border-radius: 50%;
        }

        /* Brillo de aureola dorada alrededor del corazón */
        #heart-cluster::after {
            content: '';
            position: absolute;
            top: 25%;
            left: 20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(255, 235, 59, 0.4) 0%, rgba(255, 235, 59, 0) 70%);
            border-radius: 50%;
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            animation: showGlow 1.5s ease-out 3s forwards;
        }

        /* --- TARJETA DE TEXTO (Estilo image_18.png) --- */
        .text-card {
            background-color: rgba(255, 255, 255, 0.05); /* Fondo oscuro transparente */
            border: 1px solid #ffd740; /* Borde amarillo brillante */
            border-radius: 15px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            opacity: 0;
            animation: showText 1.5s ease-out 5s forwards; /* Aparece al final */
            box-shadow: 0 0 15px rgba(255, 215, 64, 0.2);
        }

        h1 {
            color: #ffeb3b;
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 10px;
        }

        p {
            font-size: 0.9rem;
            line-height: 1.5;
            margin: 0;
        }

        /* Corazón rosa (como en la imagen) */
        .heart {
            color: #ff4081; /* Rosa intenso */
            margin-top: 15px;
            font-weight: bold;
        }

        /* --- KEYFRAMES (LAS ANIMACIONES) --- */
        @keyframes growTrunk {
            0% { height: 0; opacity: 0; }
            100% { height: 120px; opacity: 1; }
        }

        @keyframes flowerPop {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes showText {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes showGlow {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="tree-container">
        <div class="trunk"></div>
        
        <div id="heart-cluster"></div>
    </div>

    <div class="text-card">
        <h1>Flores Amarillas para ti</h1>
        <p>Si pudiera elegir un lugar seguro,</p>
        <p>sería siempre a tu lado.</p>
        <div style="height: 10px;"></div>
        <p>Porque te mereces lo más lindo del mundo.</p>
        <p class="heart">❤ Te Amo ❤</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cluster = document.getElementById('heart-cluster');
            const totalFlowers = 250; // ¡Añadiremos 250 girasoles para que sea denso!

            // Fórmula matemática para un corazón perfecto (Paramétrica)
            // t va de 0 a 2*PI
            const getHeartPoint = (t) => {
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                return { x, y };
            };

            // Generar y posicionar cientos de flores
            for (let i = 0; i < totalFlowers; i++) {
                // Parámetro 't' para cada flor (de 0 a 2*PI)
                const t = (i / totalFlowers) * 2 * Math.PI;
                const point = getHeartPoint(t);

                const flower = document.createElement('div');
                flower.classList.add('flower-item');

                // Posicionar en el centro y escalar los puntos
                const scale = 8; // Ajusta el tamaño del corazón
                const offsetX = 50; // Centro horizontal (%)
                const offsetY = 45; // Centro vertical (%)
                
                // Las matemáticas del corazón ponen (0,0) en el centro.
                // Ajustamos para que (0,0) sea el centro inferior del contenedor.
                // -point.y invierte el eje Y para que suba
                flower.style.left = (point.x * scale + offsetX) + '%';
                flower.style.top = (-point.y * scale + offsetY) + '%';

                // Añadir retraso para la animación secuencial
                // Las flores de abajo aparecen primero
                // point.y va de -17 (abajo) a 13 (arriba)
                const yDelay = (-point.y + 17) / 30; // Normalizar yDelay (más bajo -> menor retraso)
                const calculatedDelay = 1.5 + yDelay * 2.5; // Multiplicador para la velocidad de floración
                flower.style.animationDelay = calculatedDelay + 's'; // Retraso de floración

                cluster.appendChild(flower);
            }

            // Mostrar el cluster después de que el tronco empiece a crecer
            setTimeout(() => {
                cluster.style.display = 'block';
            }, 1000); // 1 segundo de retraso
        });
    </script>

</body>
</html>
