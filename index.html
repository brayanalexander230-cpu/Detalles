<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Ramo Especial para Ti 🌷</title>
    <style>
        :root { --color-tallo: #2d5a27; --color-tulipan: #ff85a2; --color-tulipan-oscuro: #f55d81; --color-papel: #f3e5dc; --color-mono: #f8bbd0; }
        body { margin: 0; height: 100vh; background-color: #0b1522; display: flex; justify-content: center; align-items: flex-end; overflow: hidden; font-family: 'Georgia', serif; color: #fff; }
        .bouquet-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 50px; }
        
        /* --- PAPEL DE ENVOLTURA (WRAP) --- */
        .wrapper { position: absolute; bottom: 80px; width: 150px; height: 200px; background-color: var(--color-papel); border-radius: 20px 20px 100px 100px; z-index: 10; transform: skewX(5deg); box-shadow: 0 10px 20px rgba(0,0,0,0.4); opacity: 0; animation: fadeIn 1s forwards; animation-delay: 2.5s; }
        .wrapper-inner { position: absolute; top: -10px; left: -10px; width: 170px; height: 220px; background-color: var(--color-papel); border-radius: 20px 20px 100px 100px; z-index: 9; transform: skewX(-10deg); filter: brightness(0.9); }

        /* --- MOÑO DE AMARRE --- */
        .ribbon { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); width: 80px; height: 40px; background-color: var(--color-mono); border-radius: 20px; z-index: 12; display: flex; justify-content: center; align-items: center; opacity: 0; animation: fadeIn 1s forwards; animation-delay: 3s; box-shadow: 0 5px 10px rgba(0,0,0,0.3); }
        .ribbon-loop { width: 30px; height: 30px; background-color: var(--color-mono); border-radius: 50%; position: absolute; filter: brightness(0.9); }
        .ribbon-left { left: 10px; } .ribbon-right { right: 10px; }
        .ribbon::after { content: ''; width: 10px; height: 10px; background-color: #fce4ec; border-radius: 50%; z-index: 13; }

        /* --- TALLOS Y FLORES TUPIDAS --- */
        .flower-group { position: relative; bottom: 180px; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; width: 220px; height: 300px; z-index: 5; }
        
        /* Contenedor individual */
        .flower { position: relative; display: flex; flex-direction: column; align-items: center; animation: bloom 1s ease-in-out forwards; opacity: 0; transform: scale(0); }
        @keyframes bloom { 100% { opacity: 1; transform: scale(1); } }

        /* Posiciones y Tiempos Aleatorios */
        .f1 { animation-delay: 0.5s; } .f2 { animation-delay: 1s; } .f3 { animation-delay: 1.5s; } .f4 { animation-delay: 2s; } .f5 { animation-delay: 2.5s; }

        /* Tallo */
        .tallo { width: 6px; height: 150px; background-color: var(--color-tallo); border-radius: 4px; position: relative; }

        /* Hojas */
        .hoja { position: absolute; width: 30px; height: 15px; background-color: var(--color-tallo); border-radius: 50% 50% 0 50%; }
        .hoja.izq { left: -25px; top: 80px; transform: rotate(-30deg); }
        .hoja.der { right: -25px; top: 60px; transform: rotate(210deg); border-radius: 50% 50% 50% 0; }

        /* Cabeza de Tulipán Realista */
        .tulipan-cabeza { position: absolute; top: -35px; width: 40px; height: 50px; z-index: 7; }
        .petalo { position: absolute; width: 100%; height: 100%; background-color: var(--color-tulipan); border-radius: 50% 50% 20% 20%; box-shadow: inset 0 0 10px rgba(0,0,0,0.15); }
        .petalo-central { z-index: 2; transform: scale(0.8); background-color: var(--color-tulipan-oscuro); }
        .petalo-izq { left: -10px; transform: rotate(-15deg); z-index: 1; }
        .petalo-der { right: -10px; transform: rotate(15deg); z-index: 1; }

        /* --- TEXTO FINAL --- */
        .text { position: absolute; bottom: 30px; color: #fff; font-size: 1.5rem; text-shadow: 0 0 15px var(--color-mono); font-weight: bold; width: 100%; text-align: center; opacity: 0; animation: fadeInText 2s ease-in forwards; animation-delay: 4.5s; }
        @keyframes fadeInText { 100% { opacity: 1; } }
        @keyframes fadeIn { 100% { opacity: 1; } }

    </style>
</head>
<body>
    <div class="bouquet-container">
        <div class="flower-group">
            <div class="flower f1">
                <div class="tulipan-cabeza">
                    <div class="petalo petalo-izq"></div>
                    <div class="petalo petalo-der"></div>
                    <div class="petalo petalo-central"></div>
                </div>
                <div class="tallo"><div class="hoja izq"></div><div class="hoja der"></div></div>
            </div>
            <div class="flower f2">
                <div class="tulipan-cabeza">
                    <div class="petalo petalo-izq"></div>
                    <div class="petalo petalo-der"></div>
                    <div class="petalo petalo-central"></div>
                </div>
                <div class="tallo"><div class="hoja izq"></div></div>
            </div>
            <div class="flower f3">
                <div class="tulipan-cabeza">
                    <div class="petalo petalo-izq"></div>
                    <div class="petalo petalo-der"></div>
                    <div class="petalo petalo-central"></div>
                </div>
                <div class="tallo"><div class="hoja der"></div></div>
            </div>
            <div class="flower f4">
                <div class="tulipan-cabeza">
                    <div class="petalo petalo-izq"></div>
                    <div class="petalo petalo-der"></div>
                    <div class="petalo petalo-central"></div>
                </div>
                <div class="tallo"></div>
            </div>
            <div class="flower f5">
                <div class="tulipan-cabeza">
                    <div class="petalo petalo-izq"></div>
                    <div class="petalo petalo-der"></div>
                    <div class="petalo petalo-central"></div>
                </div>
                <div class="tallo"><div class="hoja der"></div></div>
            </div>
        </div>

        <div class="wrapper">
            <div class="wrapper-inner"></div>
        </div>

        <div class="ribbon">
            <div class="ribbon-loop ribbon-left"></div>
            <div class="ribbon-loop ribbon-right"></div>
        </div>

        <div class="text">Un Ramo de Tulipanes <br> para mi Niña Hermosa 🌷</div>
    </div>
</body>
</html>
