<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Niña</title>
    <style>
        :root {
            --fondo: #000;
            --amarillo: #ffeb3b;
            --rosa: #ff4081;
        }

        body {
            background-color: var(--fondo);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: white;
            text-align: center;
        }

        .container {
            position: relative;
            z-index: 10;
        }

        /* El Girasol Animado */
        .flower {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            animation: float 3s ease-in-out infinite;
        }

        .center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: #5d4037;
            border-radius: 50%;
            z-index: 2;
        }

        .petal {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 60px;
            background: var(--amarillo);
            border-radius: 50%;
            transform-origin: bottom center;
            animation: bloom 2s ease-out forwards;
        }

        /* Generar pétalos en círculo */
        .p1 { transform: translate(-50%, -100%) rotate(0deg); }
        .p2 { transform: translate(-50%, -100%) rotate(45deg); }
        .p3 { transform: translate(-50%, -100%) rotate(90deg); }
        .p4 { transform: translate(-50%, -100%) rotate(135deg); }
        .p5 { transform: translate(-50%, -100%) rotate(180deg); }
        .p6 { transform: translate(-50%, -100%) rotate(225deg); }
        .p7 { transform: translate(-50%, -100%) rotate(270deg); }
        .p8 { transform: translate(-50%, -100%) rotate(315deg); }

        /* Texto Estilo Programador */
        .mensaje {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--amarillo);
            box-shadow: 0 0 20px rgba(255, 235, 59, 0.2);
        }

        h1 { color: var(--amarillo); font-size: 1.5rem; }
        p { font-size: 1rem; line-height: 1.5; }
        .heart { color: var(--rosa); font-size: 1.2rem; }

        @keyframes bloom {
            0% { transform: translate(-50%, -100%) scale(0); }
            100% { transform: translate(-50%, -100%) scale(1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="flower">
            <div class="center"></div>
            <div class="petal p1"></div>
            <div class="petal p2"></div>
            <div class="petal p3"></div>
            <div class="petal p4"></div>
            <div class="petal p5"></div>
            <div class="petal p6"></div>
            <div class="petal p7"></div>
            <div class="petal p8"></div>
        </div>

        <div class="mensaje">
            <h1>Flores Amarillas para ti</h1>
            <p>Si pudiera elegir un lugar seguro,<br>sería siempre a tu lado.</p>
            <p>Porque te mereces lo más lindo del mundo.</p>
            <div class="heart">❤ Te Amo ❤</div>
        </div>
    </div>

</body>
</html>
