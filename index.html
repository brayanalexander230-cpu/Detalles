<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas</title>
    <style>
        body {
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: white;
        }

        .tree-container {
            position: relative;
            width: 300px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        /* Tronco creciendo */
        .trunk {
            position: absolute;
            width: 12px;
            background: #3E2723;
            border-radius: 6px;
            bottom: 50px; /* Ajuste para que no tape el texto */
            height: 0;
            animation: growTrunk 1.5s ease-out forwards;
            z-index: 2;
        }

        /* Contenedor de las flores */
        #heart-cluster {
            position: absolute;
            width: 100%;
            height: 100%;
            bottom: 180px; /* Se posiciona justo donde termina el tronco */
            left: 0;
            display: none;
        }

        .flower {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #FFEB3B;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(255, 235, 59, 0.5);
            opacity: 0;
            animation: flowerPop 0.6s ease-out forwards;
        }

        /* Centro del girasol */
        .flower::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            width: 8px;
            height: 8px;
            background: #3E2723;
            border-radius: 50%;
        }

        @keyframes growTrunk {
            to { height: 150px; }
        }

        @keyframes flowerPop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .text-card {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid #ffd740;
            border-radius: 15px;
            padding: 20px;
            width: 85%;
            max-width: 400px;
            opacity: 0;
            animation: showText 1s ease-out 4s forwards;
            margin-top: 20px;
        }

        @keyframes showText {
            to { opacity: 1; transform: translateY(-10px); }
        }

        h1 { color: #FFEB3B; font-size: 1.3rem; margin-bottom: 5px; }
        p { font-size: 0.9rem; margin: 5px 0; }
        .heart-icon { color: #ff4081; font-weight: bold; }
    </style>
</head>
<body>

    <div class="tree-container">
        <div class="trunk"></div>
        <div id="heart-cluster"></div>
    </div>

    <div class="text-card">
        <h1>Flores Amarillas para ti</h1>
        <p>Si pudiera elegir un lugar seguro,</p>
        <p>sería siempre a tu lado.</p>
        <p>Porque te mereces lo más lindo del mundo.</p>
        <p class="heart-icon">❤ Te Amo ❤</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cluster = document.getElementById('heart-cluster');
            const totalFlowers = 250; // ¡Muchos girasoles para que sea tupido!
            
            // Fórmula del corazón: x = 16sin^3(t), y = 13cos(t) - 5cos(2t) - 2cos(3t) - cos(4t)
            for (let i = 0; i < totalFlowers; i++) {
                const t = Math.random() * 2 * Math.PI;
                const r = Math.sqrt(Math.random()); // Distribución interna para rellenar el corazón
                
                const x = r * 16 * Math.pow(Math.sin(t), 3);
                const y = r * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

                const flower = document.createElement('div');
                flower.className = 'flower';
                
                // Centrado y escalado
                const scale = 7; 
                flower.style.left = `calc(50% + ${x * scale}px)`;
                flower.style.bottom = `${y * scale}px`;
                
                // Animación en cascada (aparecen de abajo hacia arriba)
                const delay = 1.5 + (Math.random() * 2);
                flower.style.animationDelay = `${delay}s`;

                cluster.appendChild(flower);
            }

            // Mostrar flores tras crecer el tronco
            setTimeout(() => {
                cluster.style.display = 'block';
            }, 1000);
        });
    </script>
</body>
</html>
